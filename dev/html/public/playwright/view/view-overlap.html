<!doctype html>
<html>
    <head>
        <style>
            body {
                margin: 0;
            }
            .box {
                width: 120px;
                height: 120px;
                background: orange;
                margin: 40px;
            }
            .box.moved {
                transform: translateX(120px);
                background: purple;
            }
        </style>
    </head>
    <body>
        <div class="a b box"></div>

        <script type="module" src="/src/imports/view.js"></script>
        <script type="module">
            const { animateView } = window.MotionDOM

            window.__view = {
                ready: false,
                supported: !!document.startViewTransition,
                enterFilter: false,
                exitOpacity: [],
                error: null,
            }

            // Two subjects whose selectors resolve to the SAME element. Their
            // definitions must be merged so neither animation is dropped: `.a`'s
            // enter (filter on the new layer) AND `.b`'s exit (opacity on old).
            animateView(() =>
                document.querySelector(".box").classList.add("moved")
            )
                .add(".a")
                .enter(
                    { filter: ["blur(8px)", "blur(0px)"] },
                    { duration: 2, ease: "linear" }
                )
                .add(".b")
                .exit({ opacity: [1, 0.4] }, { duration: 2, ease: "linear" })
                .then(
                    () => {
                        const anims = document.getAnimations()
                        window.__view.enterFilter = anims.some((a) => {
                            const eff = a.effect
                            return (
                                eff &&
                                /::view-transition-new\(motion-view-\d+\)/.test(
                                    eff.pseudoElement || ""
                                ) &&
                                eff.getKeyframes().some((k) => "filter" in k)
                            )
                        })
                        const exit = anims.find((a) => {
                            const eff = a.effect
                            return (
                                eff &&
                                /::view-transition-old\(motion-view-\d+\)/.test(
                                    eff.pseudoElement || ""
                                ) &&
                                eff.getKeyframes().some((k) => "opacity" in k)
                            )
                        })
                        window.__view.exitOpacity = exit
                            ? exit.effect
                                  .getKeyframes()
                                  .map((k) => k.opacity)
                                  .filter((v) => v !== undefined)
                            : []
                        window.__view.ready = true
                    },
                    (e) => {
                        window.__view.error = String(e)
                        window.__view.ready = true
                    }
                )
        </script>
    </body>
</html>
