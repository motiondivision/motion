<!doctype html>
<html>
    <head>
        <style>
            body {
                margin: 0;
            }
            .box {
                width: 150px;
                height: 150px;
                background: red;
            }
        </style>
    </head>
    <body>
        <div class="box" id="box">A</div>

        <script type="module" src="/src/imports/view.js"></script>
        <script type="module">
            const { animateView } = window.MotionDOM

            window.__view = {
                ready: false,
                supported: !!document.startViewTransition,
                pseudos: [],
                error: null,
            }

            const collect = () =>
                document
                    .getAnimations()
                    .map((a) => a.effect && a.effect.pseudoElement)
                    .filter(Boolean)

            const box = document.getElementById("box")

            animateView(() => {
                box.textContent = "B"
                box.style.background = "blue"
            })
                .add(box)
                .enter({ opacity: [0, 1] }, { duration: 3, ease: "linear" })
                .then(
                    () => {
                        window.__view.pseudos = collect()
                        window.__view.ready = true
                    },
                    (e) => {
                        window.__view.error = String(e)
                        window.__view.ready = true
                    }
                )
        </script>
    </body>
</html>
