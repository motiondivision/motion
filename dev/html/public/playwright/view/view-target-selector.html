<!doctype html>
<html>
    <head>
        <style>
            body {
                margin: 0;
                display: flex;
                gap: 20px;
            }
            .item {
                width: 120px;
                height: 120px;
                background: red;
            }
        </style>
    </head>
    <body>
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>

        <script type="module" src="/src/imports/view.js"></script>
        <script type="module">
            const { animateView } = window.MotionDOM

            window.__view = {
                ready: false,
                supported: !!document.startViewTransition,
                pseudos: [],
                error: null,
            }

            const collect = () =>
                document
                    .getAnimations()
                    .map((a) => a.effect && a.effect.pseudoElement)
                    .filter(Boolean)

            animateView(() => {
                document
                    .querySelectorAll(".item")
                    .forEach((el) => (el.style.background = "blue"))
            })
                .add(".item")
                .enter({ opacity: [0, 1] }, { duration: 3, ease: "linear" })
                .then(
                    () => {
                        window.__view.pseudos = collect()
                        window.__view.ready = true
                    },
                    (e) => {
                        window.__view.error = String(e)
                        window.__view.ready = true
                    }
                )
        </script>
    </body>
</html>
