                display: none;
                align-items: center;

            }

            #overlay img {

        <div id="overlay">
            <img src="" alt="" />
        </div>

        <script type="module" src="/src/imports/view.js"></script>
        <script type="module">
            const { press, animateView, spring } = window.MotionDOM

            const overlay = document.getElementById("overlay")
            const overlayImage = overlay.querySelector("img")

            const transition = { type: spring, visualDuration: 0.5, bounce: 0.2 }

            let selectedImage = null

            async function openLightbox(image) {
                overlayImage.src = image.src
                selectedImage = image

                animateView(() => {
                    // Hide the thumbnail and show the overlay
                    image.style.visibility = "hidden"
                    overlay.style.display = "flex"
                }, transition)
                    // Fade the overlay in, and morph the thumbnail into the overlay image
                    .enter({ opacity: 1 })
                    .add(image, overlayImage)

                press(
                    overlay,
                    () => {
                        closeLightbox()
                    },
                    { once: true }
                )
            }

            async function closeLightbox() {
                const animation = await animateView(() => {
                    overlay.style.display = "none"
                    selectedImage.style.visibility = "visible"
                }, transition)
                    .enter({ opacity: 1 })
                    .add(overlayImage, selectedImage)

                await animation.finished

                selectedImage = null
            }

            press(".items-container img", (element) => {
                openLightbox(element)
            })
        </script>
